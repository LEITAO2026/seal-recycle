                [357, "国际公司", "沙特塔伊夫保障房项目部", "2026-12-31", "2026-06-08"],
                [358, "中豫公司", "中国建筑第七工程局有限公司国家超算互联网核心节点主机系统配套工艺机电工程施工总承包项目部", "2026-12-31",
                    "2026-06-08"],
                [359, "四川公司", "中建七局安装工程有限公司华西分公司焦作文汇苑项目", "2026-12-31", "2026-06-08"],
                [360, "四川公司", "中建七局安装工程有限公司华西分公司山阳区农业项目", "2026-12-31", "2026-06-08"],
                [361, "四川公司", "中建七局安装工程有限公司朱雀湖2号地房地产项目一期工程项目部", "2026-12-31", "2026-06-08"],
                [362, "四川公司", "中建七局安装工程有限公司朱雀湖2号地房地产项目二期工程项目部", "2026-12-31", "2026-06-08"],
                [363, "四川公司", "中国建筑第七工程局有限公司重庆世茂城项目A2地块综合机电工程项目部", "2026-12-31", "2026-06-08"],
                [364, "四川公司", "中建七局安装工程有限公司中储粮西辽河项目部", "2026-12-31", "2026-06-08"],
                [365, "四川公司", "中建七局安装工程有限公司西安高铁东城项目部", "2026-12-31", "2026-06-08"],
                [366, "四川公司", "中建七局安装工程有限公司拉萨啤酒经开区新厂项目", "2026-12-31", "2026-06-08"],
                [367, "四川公司", "中国建筑第七工程局有限公司兰州二中（2标段）项目部", "2026-12-31", "2026-06-08"],
                [368, "四川公司", "中建七局安装公司有限公司陕西欧赛利油页岩项目部", "2026-12-31", "2026-06-08"],
                [369, "四川公司", "中建七局安装工程有限公司93966部队油库综合治理项目经理部", "2026-12-31", "2026-06-08"],
                [370, "四川公司", "中国建筑第七工程局有限公司春城时光花园（3-3号地块）项目部", "2026-12-31", "2026-06-08"],
                [371, "四川公司", "中建七局安装工程有限公司鸿易庄园项目部", "2026-12-31", "2026-06-08"]
            ];

            let allSeals = [];
            let sealMap = {};

            function buildSealsFromRaw() {
                return RAW_DATA.map(row => ({
                    id: row[0],
                    sealCode: 'CSCEC7-2026-' + String(row[0]).padStart(4, '0'),
                    unitName: row[1],
                    sealName: row[2],
                    sealType: '项目印章',
                    planDate: row[3],
                    actualDate: row[4] || null
                }));
            }

            function loadData() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        if (Array.isArray(parsed) && parsed.length === 371) {
                            allSeals = parsed;
                            sealMap = {};
                            allSeals.forEach(s => sealMap[s.id] = s);
                            return;
                        }
                    } catch (e) {}
                }
                allSeals = buildSealsFromRaw();
                sealMap = {};
                allSeals.forEach(s => sealMap[s.id] = s);
                saveData();
            }

            function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(allSeals)); }

            function getStatus(s) {
                if (s.actualDate && s.actualDate.trim()) return 'recycled';
                if (s.planDate < TODAY) return 'overdue';
                return 'pending';
            }

            function statusBadge(status) {
                if (status === 'recycled') return '<span class="badge badge-recycled">✅已回收</span>';
                if (status === 'overdue') return '<span class="badge badge-overdue">⚠️逾期</span>';
                return '<span class="badge badge-pending">📋待回收</span>';
            }

            function getFiltered() {
                const u = document.getElementById('filter-unit')?.value || '';
                const st = document.getElementById('filter-status')?.value || '';
                const m = document.getElementById('filter-month')?.value || '';
                const q = (document.getElementById('filter-search')?.value || '').toLowerCase();
                return allSeals.filter(s => {
                    if (u && s.unitName !== u) return false;
                    if (st && getStatus(s) !== st) return false;
                    if (m && s.planDate.substring(5, 7) !== m) return false;
                    if (q && !(s.sealName + s.unitName + s.sealCode).toLowerCase().includes(q)) return false;
                    return true;
                });
            }

            function renderSealTable() {
                const filtered = getFiltered();
                const tbody = document.getElementById('seal-tbody');
                tbody.innerHTML = filtered.map((s, i) => {
                    const status = getStatus(s);
                    return `<tr>
                <td>${i+1}</td><td>${s.sealCode}</td><td>${s.unitName}</td>
                <td style="text-align:left;max-width:260px;white-space:normal;">${s.sealName}</td>
                <td>${s.planDate}</td>
                <td><input class="date-input" type="date" value="${s.actualDate||''}" data-id="${s.id}" max="2026-12-31"></td>
                <td>${statusBadge(status)}</td>
                <td><button class="btn-sm save" onclick="saveDate(${s.id})">保存</button>${s.actualDate?`<button class="btn-sm clear" onclick="clearDate(${s.id})">清除</button>`:''}</td>
              </tr>`;
                }).join('');
                document.getElementById('filter-count').textContent = `共 ${filtered.length} 条`;
                tbody.querySelectorAll('.date-input').forEach(inp => {
                    inp.addEventListener('change', function() {
                        const id = parseInt(this.dataset.id);
                        if (sealMap[id]) { sealMap[id].actualDate = this.value || null;
                            saveData();
                            renderAll(); }
                    });
                });
            }

            function renderStatCards() {
                const rec = allSeals.filter(s => getStatus(s) === 'recycled').length;
                const ove = allSeals.filter(s => getStatus(s) === 'overdue').length;
                const pen = allSeals.filter(s => getStatus(s) === 'pending').length;
                const rate = Math.round(rec / 371 * 100);
                const html = `
            <div class="stat-card"><div class="stat-icon blue">📋</div><div><div class="stat-value">371</div><div class="stat-label">应回收总数</div></div></div>
            <div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-value">${rec}</div><div class="stat-label">已回收</div><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${rate}%"></div></div></div></div>
            <div class="stat-card"><div class="stat-icon red">⚠️</div><div><div class="stat-value">${ove}</div><div class="stat-label">逾期未回收</div></div></div>
            <div class="stat-card"><div class="stat-icon orange">📊</div><div><div class="stat-value">${rate}%</div><div class="stat-label">回收率</div></div></div>`;
                document.getElementById('stat-cards-list').innerHTML = html;
                document.getElementById('stat-cards-db').innerHTML = html;
                document.getElementById('hdr-recycled').textContent = rec;
                document.getElementById('mini-rec').textContent = rec;
                document.getElementById('mini-pen').textContent = pen;
                document.getElementById('mini-ove').textContent = ove;
                document.getElementById('mini-rate').textContent = rate + '%';
            }

            function renderUnitSummary() {
                const units = [...new Set(allSeals.map(s => s.unitName))];
                const tbody = document.getElementById('unit-summary-body');
                tbody.innerHTML = units.map(u => {
                    const seals = allSeals.filter(s => s.unitName === u);
                    const total = seals.length;
                    const rec = seals.filter(s => getStatus(s) === 'recycled').length;
                    const ove = seals.filter(s => getStatus(s) === 'overdue').length;
                    const pen = seals.filter(s => getStatus(s) === 'pending').length;
                    const rate = Math.round(rec / total * 100);
                    return `<tr><td>${u}</td><td>${total}</td><td style="color:#2d8b4e;">${rec}</td><td>${pen}</td><td style="color:#c0392b;">${ove}</td><td>${rate}%</td><td><div class="progress-bar-wrap" style="width:100px;display:inline-block;"><div class="progress-bar-fill" style="width:${rate}%;"></div></div></td></tr>`;
                }).join('');
            }

            function renderMatrix() {
                const units = [...new Set(allSeals.map(s => s.unitName))];
                document.getElementById('matrix-head').innerHTML = '<tr><th>单位</th>' + MONTHS.map(m =>
                    `<th colspan="2">${m}<br><small>计划/实际</small></th>`).join('') + '<th>合计计划</th><th>合计实际</th></tr>';
                let body = '';
                units.forEach(u => {
                    body += `<tr><td>${u}</td>`;
                    let tp = 0,
                        ta = 0;
                    MONTH_NUMS.forEach(mn => {
                        const pc = allSeals.filter(s => s.unitName === u && s.planDate.substring(5, 7) ===
                            mn).length;
                        const ac = allSeals.filter(s => s.unitName === u && s.actualDate && s.actualDate
                            .substring(5, 7) === mn).length;
                        tp += pc;
                        ta += ac;
                        body +=
                            `<td>${pc}</td><td style="color:${ac>=pc?'#2d8b4e':(ac>0?'#e67e22':'#999')}">${ac||'-'}</td>`;
                    });
                    body += `<td><b>${tp}</b></td><td style="color:#2d8b4e;"><b>${ta}</b></td></tr>`;
                });
                body += '<tr style="background:#f0f4f8;font-weight:700;"><td>📌合计</td>';
                let gtp = 0,
                    gta = 0;
                MONTH_NUMS.forEach(mn => {
                    const pc = allSeals.filter(s => s.planDate.substring(5, 7) === mn).length;
                    const ac = allSeals.filter(s => s.actualDate && s.actualDate.substring(5, 7) === mn).length;
                    gtp += pc;
                    gta += ac;
                    body += `<td>${pc}</td><td style="color:#2d8b4e;">${ac||'-'}</td>`;
                });
                body += `<td>${gtp}</td><td style="color:#2d8b4e;">${gta}</td></tr>`;
                document.getElementById('matrix-body').innerHTML = body;
            }

            function populateFilters() {
                const units = [...new Set(allSeals.map(s => s.unitName))];
                const sel = document.getElementById('filter-unit');
                if (sel.options.length <= 1) { units.forEach(u => { const o = document.createElement('option');
                        o.value = u;
                        o.textContent = u;
                        sel.appendChild(o); }); }
                const ms = document.getElementById('filter-month');
                if (ms.options.length <= 1) { MONTH_NUMS.forEach((mn, i) => { const o = document.createElement(
                            'option');
                        o.value = mn;
                        o.textContent = MONTHS[i];
                        ms.appendChild(o); }); }
            }

            let charts = {};

            function destroyCharts() { Object.values(charts).forEach(c => { if (c) c.destroy(); });
                charts = {}; }

            function renderCharts() {
                destroyCharts();
                const panel = document.getElementById('panel-dashboard');
                if (!panel.classList.contains('active')) return;
                const monthlyPlan = MONTH_NUMS.map(mn => allSeals.filter(s => s.planDate.substring(5, 7) === mn).length);
                const monthlyActual = MONTH_NUMS.map(mn => allSeals.filter(s => s.actualDate && s.actualDate.substring(5,
                    7) === mn).length);
                const ctx1 = document.getElementById('chart-bar')?.getContext('2d');
                if (ctx1) charts.bar = new Chart(ctx1, { type: 'bar', data: { labels: MONTHS, datasets: [{ label: '计划',
                            data: monthlyPlan, backgroundColor: '#7ea8d4' }, { label: '实际', data: monthlyActual,
                            backgroundColor: '#2d8b4e' }] }, options: { responsive: true, plugins: { legend: { position: 'bottom' } },
                        scales: { y: { beginAtZero: true } } } });
                const rec = allSeals.filter(s => getStatus(s) === 'recycled').length;
                const ctx2 = document.getElementById('chart-donut')?.getContext('2d');
                if (ctx2) charts.donut = new Chart(ctx2, { type: 'doughnut', data: { labels: ['已回收', '未回收'],
                        datasets: [{ data: [rec, 371 - rec], backgroundColor: ['#2d8b4e', '#e0e5ea'] }] },
                    options: { plugins: { legend: { position: 'bottom' } } } });
                const units = [...new Set(allSeals.map(s => s.unitName))];
                const ulabels = units.map(u => u.length > 8 ? u.substring(0, 8) + '…' : u);
                const uRec = units.map(u => allSeals.filter(s => s.unitName === u && getStatus(s) === 'recycled').length);
                const uTotal = units.map(u => allSeals.filter(s => s.unitName === u).length);
                const ctx3 = document.getElementById('chart-unit')?.getContext('2d');
                if (ctx3) charts.unit = new Chart(ctx3, { type: 'bar', data: { labels: ulabels, datasets: [{ label: '应回收',
                            data: uTotal, backgroundColor: '#b0c4de' }, { label: '已回收', data: uRec,
                            backgroundColor: '#2d8b4e' }] }, options: { indexAxis: 'y', responsive: true,
                        plugins: { legend: { position: 'bottom' } }, scales: { x: { beginAtZero: true } } } });
                let cp = 0,
                    ca = 0;
                const cumPlan = [],
                    cumAct = [];
                MONTH_NUMS.forEach(mn => { cp += allSeals.filter(s => s.planDate.substring(5, 7) === mn).length;
                    ca += allSeals.filter(s => s.actualDate && s.actualDate.substring(5, 7) === mn).length;
                    cumPlan.push(cp);
                    cumAct.push(ca); });
                const ctx4 = document.getElementById('chart-cum')?.getContext('2d');
                if (ctx4) charts.cum = new Chart(ctx4, { type: 'line', data: { labels: MONTHS, datasets: [{ label: '累计计划',
                            data: cumPlan, borderColor: '#7ea8d4', backgroundColor: 'rgba(126,168,212,0.1)',
                            fill: true }, { label: '累计实际', data: cumAct, borderColor: '#2d8b4e',
                            backgroundColor: 'rgba(45,139,78,0.08)', fill: true }] },
                    options: { responsive: true, plugins: { legend: { position: 'bottom' } },
                        scales: { y: { beginAtZero: true, max: 380 } } } });
            }

            function renderAll() { renderSealTable();
                renderStatCards();
                renderUnitSummary();
                renderMatrix();
                renderCharts();
                populateFilters(); }

            window.saveDate = function(id) { const inp = document.querySelector(`.date-input[data-id="${id}"]`); if (inp &&
                    sealMap[id]) { sealMap[id].actualDate = inp.value || null;
                    saveData();
                    renderAll();
                    showToast('已保存'); } };
            window.clearDate = function(id) { if (sealMap[id]) { sealMap[id].actualDate = null;
                    saveData();
                    renderAll();
                    showToast('已清除'); } };
            window.resetFilters = function() { document.getElementById('filter-unit').value = '';
                document.getElementById('filter-status').value = '';
                document.getElementById('filter-month').value = '';
                document.getElementById('filter-search').value = '';
                renderSealTable(); };

            function showToast(m) { const t = document.getElementById('toast');
                t.textContent = m;
                t.style.display = 'block';
                clearTimeout(t._t);
                t._t = setTimeout(() => t.style.display = 'none', 1800); }

            function switchPanel(id) {
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                document.querySelector(`.nav-item[data-panel="${id}"]`).classList.add('active');
                if (id === 'panel-dashboard') setTimeout(renderCharts, 200);
            }
            document.getElementById('sidebar').addEventListener('click', e => {
                const item = e.target.closest('.nav-item');
                if (item) switchPanel(item.dataset.panel);
            });
            document.getElementById('filter-unit').addEventListener('change', renderSealTable);
            document.getElementById('filter-status').addEventListener('change', renderSealTable);
            document.getElementById('filter-month').addEventListener('change', renderSealTable);
            document.getElementById('filter-search').addEventListener('input', function() { clearTimeout(this._deb);
                this._deb = setTimeout(renderSealTable, 300); });
            loadData();
            renderAll();
            switchPanel('panel-list');
            console.log('✅ 中建七局2026印章回收系统已加载，共371条真实数据');
        })();
    </script>
</body>
</html>
